<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phone Check-In</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%231a1a18'/><rect x='10' y='4' width='12' height='20' rx='3' fill='none' stroke='%23f5f4f0' stroke-width='2'/><circle cx='16' cy='21' r='1' fill='%23f5f4f0'/><line x1='8' y1='27' x2='24' y2='27' stroke='%23e24b4a' stroke-width='2.5' stroke-linecap='round'/><line x1='11' y1='30' x2='21' y2='30' stroke='%23e24b4a' stroke-width='2' stroke-linecap='round'/></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#f5f4f0;--surface:#ffffff;--surface2:#eeede7;--surface3:#e6e5de;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.2);
  --text:#1a1a18;--text2:#5a5a56;--text3:#9a9a94;
  --radius:10px;--radius-lg:14px;
  --red-bg:#fcebeb;--red-border:#e24b4a;--red-text:#a32d2d;
  --amber-bg:#faeeda;--amber-border:#ef9f27;--amber-text:#633806;
  --green-bg:#eaf3de;--green-border:#97c459;--green-text:#3b6d11;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.app{max-width:1100px;margin:0 auto;padding:1.25rem 1rem}

/* NAV */
.topbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:0.5px solid var(--border2)}
.topbar-title{font-size:18px;font-weight:600;margin-right:auto;display:flex;align-items:center;gap:8px}
.topbar-title i{color:var(--text2)}
.nav-btn{height:34px;padding:0 13px;border-radius:20px;border:0.5px solid var(--border2);background:var(--surface);color:var(--text2);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all 0.15s}
.nav-btn:hover{background:var(--surface2);color:var(--text)}
.nav-btn.active{background:var(--text);color:#fff;border-color:var(--text)}

/* BUTTONS */
.btn{height:36px;padding:0 14px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background 0.15s}
.btn:hover{background:var(--surface2)}
.btn.danger{color:var(--red-text);border-color:var(--red-border)}
.btn.danger:hover{background:var(--red-bg)}

/* INPUTS */
input,select{height:36px;padding:0 12px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif}
input:focus,select:focus{outline:2px solid var(--text);outline-offset:1px}
input::placeholder{color:var(--text3)}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:1.25rem}
.stat{background:var(--surface);border-radius:var(--radius-lg);padding:12px 14px;border:0.5px solid var(--border)}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.04em}
.stat-val{font-size:24px;font-weight:600;line-height:1}

/* TABS */
.tab-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1rem}
.tab{padding:5px 13px;border-radius:20px;border:0.5px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;transition:all 0.12s}
.tab:hover{background:var(--surface2);color:var(--text)}
.tab.active{background:var(--text);color:#fff;border-color:var(--text)}

/* SCAN BAR */
.scan-bar{display:flex;gap:8px;margin-bottom:1rem}
.scan-bar input{flex:1;height:42px;font-size:14px}

/* GRID */
.student-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:7px}
.chip{border-radius:var(--radius-lg);border:0.5px solid var(--border);padding:10px 12px;cursor:pointer;user-select:none;background:var(--surface);transition:transform 0.1s}
.chip:active{transform:scale(0.97)}
.chip-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chip-meta{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px}
.chip-badge{font-size:11px;font-weight:500;margin-top:6px;padding:2px 7px;border-radius:20px;display:inline-block}
.chip.s-out{border-color:var(--red-border);background:var(--red-bg)}
.chip.s-out .chip-name{color:var(--red-text)}
.chip.s-out .chip-badge{background:var(--red-border);color:#fff}
.chip.s-late{border-color:var(--amber-border);background:var(--amber-bg)}
.chip.s-late .chip-name{color:var(--amber-text)}
.chip.s-late .chip-badge{background:var(--amber-border);color:#fff}

/* ADD PANEL */
.add-panel{background:var(--surface2);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:1rem;display:none;gap:10px;flex-wrap:wrap;align-items:flex-end;border:0.5px solid var(--border)}
.add-panel.open{display:flex}
.add-panel label{font-size:11px;color:var(--text2);display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.04em}

/* MODAL OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;display:none;align-items:center;justify-content:center;padding:1rem}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);padding:1.5rem;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;border:0.5px solid var(--border2)}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem}
.modal-title{font-size:16px;font-weight:600}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text2);font-size:20px;padding:0;line-height:1}
.modal-close:hover{color:var(--text)}

/* HISTORY / LOG */
.log-entry{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:0.5px solid var(--border);font-size:13px}
.log-date{color:var(--text2);min-width:95px;font-family:'DM Mono',monospace;font-size:12px}
.badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px}
.badge-out{background:var(--red-bg);color:var(--red-text)}
.badge-late{background:var(--amber-bg);color:var(--amber-text)}
.badge-in{background:var(--green-bg);color:var(--green-text)}

/* TREND BARS */
.trend-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:0.5px solid var(--border)}
.trend-name{font-size:13px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trend-bar-wrap{width:120px;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden}
.trend-bar{height:100%;border-radius:4px;background:var(--red-border)}
.trend-count{font-size:12px;color:var(--text2);min-width:30px;text-align:right;font-family:'DM Mono',monospace}

/* CLASS SUMMARY CARDS */
.class-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:1.5rem}
.class-card{background:var(--surface);border-radius:var(--radius-lg);border:0.5px solid var(--border);padding:12px 14px;cursor:pointer;transition:border-color 0.15s}
.class-card:hover{border-color:var(--border2)}
.class-card-name{font-size:15px;font-weight:600;margin-bottom:6px}
.class-mini-stats{display:flex;gap:6px;flex-wrap:wrap}
.mini-badge{font-size:11px;padding:2px 6px;border-radius:20px}

/* SECTION VIEWS */
.view{display:none}.view.active{display:block}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#f5f4f0;padding:10px 20px;border-radius:var(--radius);font-size:13px;z-index:200;opacity:0;transition:opacity 0.2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* SEARCH */
.search-input{width:100%;margin-bottom:1rem}

/* STAT COLORS */
.red{color:var(--red-text)}.amber{color:var(--amber-text)}.green{color:var(--green-text)}
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pinScreen" style="position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center">
  <div style="text-align:center;width:280px">
    <div style="font-size:22px;font-weight:600;margin-bottom:6px">Phone Check-In</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:2rem">Enter PIN to continue</div>
    <div id="pinDots" style="display:flex;justify-content:center;gap:12px;margin-bottom:1.5rem">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <div id="pinError" style="font-size:12px;color:var(--red-text);height:16px;margin-bottom:0.75rem"></div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
      <button class="pinkey" onclick="pinPress('1')">1</button>
      <button class="pinkey" onclick="pinPress('2')">2</button>
      <button class="pinkey" onclick="pinPress('3')">3</button>
      <button class="pinkey" onclick="pinPress('4')">4</button>
      <button class="pinkey" onclick="pinPress('5')">5</button>
      <button class="pinkey" onclick="pinPress('6')">6</button>
      <button class="pinkey" onclick="pinPress('7')">7</button>
      <button class="pinkey" onclick="pinPress('8')">8</button>
      <button class="pinkey" onclick="pinPress('9')">9</button>
      <button class="pinkey" onclick="pinPress('back')" style="font-size:18px">⌫</button>
      <button class="pinkey" onclick="pinPress('0')">0</button>
      <button class="pinkey" onclick="pinPress('enter')" style="background:var(--text);color:#fff;border-color:var(--text)">OK</button>
    </div>
  </div>
</div>

<style>
.dot{width:12px;height:12px;border-radius:50%;border:1.5px solid var(--border2);background:transparent;transition:background 0.15s}
.dot.filled{background:var(--text);border-color:var(--text)}
.pinkey{height:56px;border-radius:var(--radius-lg);border:0.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:20px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;transition:background 0.12s}
.pinkey:hover{background:var(--surface2)}
.pinkey:active{background:var(--surface3)}
</style>

<script>
const PIN='202601';
let pinBuf='';
function pinPress(v){
  const err=document.getElementById('pinError');
  err.textContent='';
  if(v==='back'){pinBuf=pinBuf.slice(0,-1);}
  else if(v==='enter'){checkPin();}
  else if(pinBuf.length<6){pinBuf+=v;}
  updateDots();
  if(pinBuf.length===6) setTimeout(checkPin,120);
}
function updateDots(){
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('filled',i<pinBuf.length));
}
function checkPin(){
  if(pinBuf===PIN){
    document.getElementById('pinScreen').style.display='none';
  } else {
    document.getElementById('pinError').textContent='Incorrect PIN';
    pinBuf='';updateDots();
  }
}
document.addEventListener('keydown',e=>{
  if(document.getElementById('pinScreen').style.display==='none') return;
  if(e.key>='0'&&e.key<='9') pinPress(e.key);
  else if(e.key==='Backspace') pinPress('back');
  else if(e.key==='Enter') pinPress('enter');
});
</script>


<!-- UPLOAD SCREEN -->
<div id="uploadScreen" style="position:fixed;inset:0;background:var(--bg);z-index:998;display:none;align-items:center;justify-content:center">
  <div style="text-align:center;width:360px;padding:2rem">
    <i class="ti ti-users" style="font-size:40px;color:var(--text2);margin-bottom:1rem;display:block" aria-hidden="true"></i>
    <div style="font-size:18px;font-weight:600;margin-bottom:8px">No student data found</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:1.5rem;line-height:1.6">Upload a CSV file to get started. Data is stored locally on this device only and never sent anywhere.</div>
    <div style="background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:14px;margin-bottom:1rem;text-align:left">
      <div style="font-size:12px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.04em">Expected CSV format</div>
      <code style="font-size:12px;font-family:'DM Mono',monospace;color:var(--text);line-height:1.7;display:block">ID,Name,Class<br>C005508976,Anton Larsson,7A<br>C005508979,Mias Hiji,7A</code>
    </div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      <label class="btn" style="cursor:pointer"><i class="ti ti-upload" aria-hidden="true"></i>Upload CSV<input type="file" accept=".csv" style="display:none" onchange="handleCSVUpload(this)"></label>
      <button class="btn" onclick="downloadTemplate()"><i class="ti ti-download" aria-hidden="true"></i>Download template</button>
    </div>
    <div id="uploadError" style="font-size:12px;color:var(--red-text);margin-top:10px;min-height:16px"></div>
  </div>
</div>

<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-title"><i class="ti ti-device-mobile-off" aria-hidden="true"></i>Phone check-in</div>
    <button class="nav-btn active" id="navDash" onclick="switchView('dash')"><i class="ti ti-layout-grid" aria-hidden="true"></i>Dashboard</button>
    <button class="nav-btn" id="navTrends" onclick="switchView('trends')"><i class="ti ti-chart-bar" aria-hidden="true"></i>Trends</button>
    <button class="nav-btn" id="navStudents" onclick="switchView('students')"><i class="ti ti-users" aria-hidden="true"></i>Students</button>
    <input type="date" id="datePicker" style="height:34px;font-size:13px;cursor:pointer">
    <button class="nav-btn" onclick="exportCSV()"><i class="ti ti-download" aria-hidden="true"></i>Export</button>
  </div>

  <!-- ADD STUDENT PANEL -->
  <div class="add-panel" id="addPanel">
    <div><label>Barcode / ID</label><input id="newId" placeholder="scan or type" style="width:150px"></div>
    <div><label>Full name</label><input id="newName" placeholder="Student name" style="width:180px"></div>
    <div><label>Class</label>
      <select id="newClass">
        <option>7A</option><option>7B</option><option>7C</option>
        <option>8A</option><option>8B</option><option>8C</option>
        <option>9A</option><option>9B</option><option>9C</option><option>9D</option>
      </select>
    </div>
    <button class="btn" onclick="addStudent()"><i class="ti ti-check" aria-hidden="true"></i>Add</button>
    <button class="btn" onclick="toggleAdd()"><i class="ti ti-x" aria-hidden="true"></i>Cancel</button>
  </div>

  <!-- ============ DASHBOARD VIEW ============ -->
  <div class="view active" id="viewDash">
    <div class="stats-row" id="statsRow"></div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:0.75rem;flex-wrap:wrap">
      <div class="tab-bar" id="tabBar" style="margin:0;flex:1"></div>
      <button class="btn" onclick="toggleAdd()"><i class="ti ti-plus" aria-hidden="true"></i>Add student</button>
    </div>
    <div class="scan-bar">
      <input id="scanInput" placeholder="Scan barcode here, or type to search…" autocomplete="off">
      <button class="btn" onclick="document.getElementById('scanInput').value='';renderGrid()"><i class="ti ti-x" aria-hidden="true"></i></button>
    </div>
    <div class="student-grid" id="studentGrid"></div>
  </div>

  <!-- ============ TRENDS VIEW ============ -->
  <div class="view" id="viewTrends">
    <div class="tab-bar" id="trendTabBar" style="margin-bottom:1.25rem"></div>
    <div id="trendsContent"></div>
  </div>

  <!-- ============ STUDENTS VIEW ============ -->
  <div class="view" id="viewStudents">
    <div style="display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center">
      <input class="search-input" id="studentSearch" placeholder="Search by name or ID…" style="flex:1;min-width:200px;margin:0" oninput="renderStudentList()">
      <select id="studentClassFilter" onchange="renderStudentList()" style="height:36px">
        <option value="ALL">All classes</option>
      </select>
      <label class="btn" style="cursor:pointer" title="Replace student list without clearing incident logs"><i class="ti ti-upload" aria-hidden="true"></i>Re-upload students<input type="file" accept=".csv" style="display:none" onchange="handleCSVUpload(this)"></label>
      <button class="btn danger" onclick="clearStudentData()" title="Remove all student data from this device"><i class="ti ti-database-off" aria-hidden="true"></i>Clear data</button>
    </div>
    <div id="studentListContent"></div>
  </div>

</div>

<!-- STUDENT DRILLDOWN MODAL -->
<div class="overlay" id="drillOverlay" onclick="closeDrill(event)">
  <div class="modal" id="drillModal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="drillName"></div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px;font-family:'DM Mono',monospace" id="drillMeta"></div>
      </div>
      <button class="modal-close" onclick="closeDrillModal()"><i class="ti ti-x"></i></button>
    </div>
    <div id="drillContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CLASSES=['7A','7B','7C','8A','8B','8C','9A','9B','9C','9D'];


// ─── STORAGE ───────────────────────────────────────────────
function todayKey(){return new Date().toISOString().slice(0,10)}
function loadStudents(){
  const s=localStorage.getItem('phc_students');
  return s?JSON.parse(s):{};
}
function hasStudents(){
  const s=loadStudents();
  return Object.values(s).some(x=>x.active);
}
function saveStudents(d){localStorage.setItem('phc_students',JSON.stringify(d))}
function loadLogs(){const s=localStorage.getItem('phc_logs');return s?JSON.parse(s):{}}
function saveLogs(d){localStorage.setItem('phc_logs',JSON.stringify(d))}
function getDayLogs(dk){const l=loadLogs();return l[dk]||{}}
function setDayLog(dk,id,status){
  const l=loadLogs();
  if(!l[dk]) l[dk]={};
  if(status==='in') delete l[dk][id];
  else l[dk][id]=status;
  saveLogs(l);
}

// ─── STATE ─────────────────────────────────────────────────
let currentClass='ALL';
let currentDate=todayKey();
let trendClass='ALL';

const dp=document.getElementById('datePicker');
dp.value=currentDate;
dp.addEventListener('change',()=>{currentDate=dp.value;renderDash()});

// ─── CYCLE STATUS ──────────────────────────────────────────
function cycleStatus(id){
  const dl=getDayLogs(currentDate);
  const cur=dl[id]||'in';
  const next=cur==='in'?'out':cur==='out'?'late':'in';
  setDayLog(currentDate,id,next);
  const labels={out:'Not handed in',late:'Late / Reception',in:'Handed in ✓'};
  showToast(labels[next]);
  renderDash();
}

// ─── VIEWS ─────────────────────────────────────────────────
function switchView(v){
  ['dash','trends','students'].forEach(n=>{
    document.getElementById('view'+n.charAt(0).toUpperCase()+n.slice(1)).classList.toggle('active',n===v);
    document.getElementById('nav'+n.charAt(0).toUpperCase()+n.slice(1)).classList.toggle('active',n===v);
  });
  if(v==='trends') renderTrends();
  if(v==='students') renderStudentList();
}

// ─── DASHBOARD ─────────────────────────────────────────────
function renderDash(){renderStats();renderTabs();renderGrid()}

function renderStats(){
  const students=loadStudents();
  const dl=getDayLogs(currentDate);
  const list=Object.values(students).filter(s=>s.active&&(currentClass==='ALL'||s.cls===currentClass));
  const total=list.length;
  const out=list.filter(s=>dl[s.id]==='out').length;
  const late=list.filter(s=>dl[s.id]==='late').length;
  const ok=total-out-late;
  document.getElementById('statsRow').innerHTML=`
    <div class="stat"><div class="stat-label">Total</div><div class="stat-val">${total}</div></div>
    <div class="stat"><div class="stat-label">Not handed in</div><div class="stat-val" style="color:var(--red-text)">${out}</div></div>
    <div class="stat"><div class="stat-label">Late / Reception</div><div class="stat-val" style="color:var(--amber-text)">${late}</div></div>
    <div class="stat"><div class="stat-label">Handed in / OK</div><div class="stat-val" style="color:var(--green-text)">${ok}</div></div>
  `;
}

function renderTabs(){
  const bar=document.getElementById('tabBar');
  bar.innerHTML='';
  ['ALL',...CLASSES].forEach(c=>{
    const b=document.createElement('button');
    b.className='tab'+(c===currentClass?' active':'');
    b.textContent=c;
    b.onclick=()=>{currentClass=c;renderDash()};
    bar.appendChild(b);
  });
}

function renderGrid(){
  const students=loadStudents();
  const dl=getDayLogs(currentDate);
  const q=document.getElementById('scanInput').value.trim().toLowerCase();
  let list=Object.values(students).filter(s=>s.active&&(currentClass==='ALL'||s.cls===currentClass));
  if(q) list=list.filter(s=>s.name.toLowerCase().includes(q)||s.id.toLowerCase().includes(q));
  list.sort((a,b)=>a.name.localeCompare(b.name,'sv'));
  const grid=document.getElementById('studentGrid');
  grid.innerHTML='';
  const statusLabel={out:'Not handed in',late:'Late / Reception'};
  list.forEach(s=>{
    const st=dl[s.id]||'in';
    const d=document.createElement('div');
    d.className='chip s-'+st;
    d.title='Click to cycle status';
    d.innerHTML=`<div class="chip-name">${s.name}</div><div class="chip-meta">${s.id} · ${s.cls}</div>${st!=='in'?`<div class="chip-badge">${statusLabel[st]}</div>`:''}`;
    d.onclick=()=>cycleStatus(s.id);
    grid.appendChild(d);
  });
}

// scan input: manual typing filters grid
document.getElementById('scanInput').addEventListener('input',renderGrid);
document.getElementById('scanInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const val=e.target.value.trim();
    const students=loadStudents();
    const match=Object.values(students).find(s=>s.id.toLowerCase()===val.toLowerCase());
    if(match){cycleStatus(match.id);e.target.value='';renderGrid();}
  }
});

// global barcode capture — works without clicking the search box first
// scanners send characters rapidly then Enter; keyboard typing is slower
let globalBuf='';
let globalTimer=null;
document.addEventListener('keydown',e=>{
  // ignore if user is typing in any input, select, or textarea
  const tag=document.activeElement.tagName;
  if(tag==='INPUT'||tag==='SELECT'||tag==='TEXTAREA') return;
  // ignore modifier-only keys and non-printable except Enter
  if(e.key==='Enter'){
    const val=globalBuf.trim();
    globalBuf='';
    if(val.length<4) return; // too short to be a barcode
    const students=loadStudents();
    const match=Object.values(students).find(s=>s.id.toLowerCase()===val.toLowerCase());
    if(match){
      cycleStatus(match.id);
    } else {
      // not a direct ID match — put it into the search box as a fallback
      const si=document.getElementById('scanInput');
      si.value=val;
      si.focus();
      renderGrid();
    }
    return;
  }
  if(e.key.length===1){
    globalBuf+=e.key;
    if(globalTimer) clearTimeout(globalTimer);
    // if no Enter arrives within 100ms, assume it was keyboard typing — clear buffer
    globalTimer=setTimeout(()=>{globalBuf=''},100);
  }
});

// ─── ADD / REMOVE STUDENT ──────────────────────────────────
function toggleAdd(){
  document.getElementById('addPanel').classList.toggle('open');
}
function addStudent(){
  const id=document.getElementById('newId').value.trim();
  const name=document.getElementById('newName').value.trim();
  const cls=document.getElementById('newClass').value;
  if(!id||!name){showToast('Enter ID and name');return}
  const students=loadStudents();
  if(students[id]){showToast('ID already exists');return}
  students[id]={id,name,cls,active:true};
  saveStudents(students);
  document.getElementById('newId').value='';
  document.getElementById('newName').value='';
  document.getElementById('addPanel').classList.remove('open');
  showToast(`${name} added to ${cls}`);
  renderDash();
  renderStudentList();
}
function removeStudent(id){
  const students=loadStudents();
  if(!students[id]) return;
  if(!confirm(`Remove ${students[id].name}? Their history will be kept.`)) return;
  students[id].active=false;
  saveStudents(students);
  showToast('Student removed');
  renderDash();
  renderStudentList();
  closeDrillModal();
}
function reactivateStudent(id){
  const students=loadStudents();
  if(!students[id]) return;
  students[id].active=true;
  saveStudents(students);
  showToast('Student reactivated');
  renderStudentList();
}

// ─── STUDENT LIST VIEW ─────────────────────────────────────
function renderStudentList(){
  // populate class filter
  const cf=document.getElementById('studentClassFilter');
  if(cf.options.length<=1){
    CLASSES.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;cf.appendChild(o)});
  }
  const q=document.getElementById('studentSearch').value.trim().toLowerCase();
  const cls=cf.value;
  const students=loadStudents();
  let list=Object.values(students).filter(s=>(cls==='ALL'||s.cls===cls)&&(s.name.toLowerCase().includes(q)||s.id.toLowerCase().includes(q)));
  list.sort((a,b)=>a.name.localeCompare(b.name,'sv'));
  const logs=loadLogs();
  const content=document.getElementById('studentListContent');
  if(!list.length){content.innerHTML='<p style="color:var(--text3);font-size:13px">No students found.</p>';return}

  // group by active/inactive
  const active=list.filter(s=>s.active);
  const inactive=list.filter(s=>!s.active);

  let html='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px">';
  active.forEach(s=>{
    const incidents=Object.values(logs).filter(dl=>dl[s.id]).length;
    html+=`<div style="background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px">
      <div style="flex:1;min-width:0;cursor:pointer" onclick="openDrill('${s.id}')">
        <div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.name}</div>
        <div style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace">${s.id} · ${s.cls}</div>
        ${incidents>0?`<div style="font-size:11px;color:var(--red-text);margin-top:3px">${incidents} incident${incidents>1?'s':''}</div>`:''}
      </div>
      <div style="display:flex;gap:5px;flex-shrink:0">
        <button class="btn" style="height:28px;padding:0 8px;font-size:12px" onclick="openDrill('${s.id}')"><i class="ti ti-chart-line"></i></button>
        <button class="btn danger" style="height:28px;padding:0 8px;font-size:12px" onclick="removeStudent('${s.id}')"><i class="ti ti-trash"></i></button>
      </div>
    </div>`;
  });
  html+='</div>';

  if(inactive.length){
    html+=`<div style="margin-top:1.5rem;margin-bottom:0.5rem;font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em">Removed students</div>`;
    html+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px">';
    inactive.forEach(s=>{
      html+=`<div style="background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;opacity:0.6">
        <div>
          <div style="font-size:13px;font-weight:500;text-decoration:line-through">${s.name}</div>
          <div style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace">${s.id} · ${s.cls}</div>
        </div>
        <button class="btn" style="height:28px;padding:0 8px;font-size:12px" onclick="reactivateStudent('${s.id}')">Restore</button>
      </div>`;
    });
    html+='</div>';
  }
  content.innerHTML=html;
}

// ─── DRILLDOWN MODAL ───────────────────────────────────────
function openDrill(id){
  const students=loadStudents();
  const s=students[id];
  if(!s) return;
  const logs=loadLogs();
  document.getElementById('drillName').textContent=s.name;
  document.getElementById('drillMeta').textContent=`${s.id} · Class ${s.cls}`;

  // collect all log entries for this student
  const entries=[];
  Object.entries(logs).forEach(([date,dl])=>{if(dl[id]) entries.push({date,status:dl[id]})});
  entries.sort((a,b)=>b.date.localeCompare(a.date));

  const outCount=entries.filter(e=>e.status==='out').length;
  const lateCount=entries.filter(e=>e.status==='late').length;
  const totalDays=Object.keys(logs).length;

  // last 7 days streak
  const last7=[];
  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);last7.push(d.toISOString().slice(0,10))}

  let html=`
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem">
      <div class="stat"><div class="stat-label">Not in</div><div class="stat-val" style="color:var(--red-text)">${outCount}</div></div>
      <div class="stat"><div class="stat-label">Late</div><div class="stat-val" style="color:var(--amber-text)">${lateCount}</div></div>
      <div class="stat"><div class="stat-label">Total incidents</div><div class="stat-val">${outCount+lateCount}</div></div>
    </div>
    <div style="margin-bottom:1.25rem">
      <div style="font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px">Last 7 days</div>
      <div style="display:flex;gap:5px">`;
  last7.forEach(date=>{
    const st=logs[date]?logs[date][id]||'ok':'–';
    const label=date.slice(5);
    const bg=st==='out'?'var(--red-bg)':st==='late'?'var(--amber-bg)':'var(--surface2)';
    const border=st==='out'?'var(--red-border)':st==='late'?'var(--amber-border)':'var(--border)';
    const tc=st==='out'?'var(--red-text)':st==='late'?'var(--amber-text)':'var(--text3)';
    html+=`<div style="flex:1;text-align:center;padding:6px 4px;border-radius:8px;background:${bg};border:0.5px solid ${border}">
      <div style="font-size:10px;color:${tc};font-family:'DM Mono',monospace">${label}</div>
      <div style="font-size:11px;font-weight:500;color:${tc};margin-top:2px">${st==='out'?'OUT':st==='late'?'LATE':st==='ok'?'OK':'–'}</div>
    </div>`;
  });
  html+=`</div></div>`;

  if(entries.length){
    html+=`<div style="font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px">Full history</div>`;
    entries.forEach(e=>{
      const badge=e.status==='out'?'<span class="badge badge-out">Not handed in</span>':'<span class="badge badge-late">Late / Reception</span>';
      html+=`<div class="log-entry"><span class="log-date">${e.date}</span>${badge}</div>`;
    });
  } else {
    html+=`<div style="font-size:13px;color:var(--text3);padding:1rem 0">No incidents recorded for this student.</div>`;
  }

  document.getElementById('drillContent').innerHTML=html;
  document.getElementById('drillOverlay').classList.add('open');
}
function closeDrillModal(){document.getElementById('drillOverlay').classList.remove('open')}
function closeDrill(e){if(e.target===document.getElementById('drillOverlay')) closeDrillModal()}

// ─── TRENDS VIEW ───────────────────────────────────────────
function renderTrends(){
  // rebuild trend tabs
  const bar=document.getElementById('trendTabBar');
  bar.innerHTML='';
  ['ALL',...CLASSES].forEach(c=>{
    const b=document.createElement('button');
    b.className='tab'+(c===trendClass?' active':'');
    b.textContent=c;
    b.onclick=()=>{trendClass=c;renderTrendContent()};
    bar.appendChild(b);
  });
  renderTrendContent();
}

function renderTrendContent(){
  const students=loadStudents();
  const logs=loadLogs();
  const allDates=Object.keys(logs).sort();
  const last30=allDates.slice(-30);

  // per-class summary
  const classStats={};
  CLASSES.forEach(c=>{classStats[c]={out:0,late:0,days:new Set()}});
  Object.entries(logs).forEach(([date,dl])=>{
    Object.entries(dl).forEach(([id,st])=>{
      const s=students[id];
      if(!s||!s.active) return;
      if(!classStats[s.cls]) return;
      classStats[s.cls][st]=(classStats[s.cls][st]||0)+1;
      classStats[s.cls].days.add(date);
    });
  });

  // top repeat offenders (all time)
  const studentTotals=Object.values(students).filter(s=>s.active&&(trendClass==='ALL'||s.cls===trendClass)).map(s=>{
    const total=Object.values(logs).filter(dl=>dl[s.id]).length;
    const out=Object.values(logs).filter(dl=>dl[s.id]==='out').length;
    const late=Object.values(logs).filter(dl=>dl[s.id]==='late').length;
    return{...s,total,out,late};
  }).filter(s=>s.total>0).sort((a,b)=>b.total-a.total).slice(0,20);

  const maxTotal=studentTotals.length?studentTotals[0].total:1;

  // daily trend (last 14 days)
  const last14=[];
  for(let i=13;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);last14.push(d.toISOString().slice(0,10))}
  const dailyCounts=last14.map(date=>{
    const dl=logs[date]||{};
    const entries=Object.entries(dl).filter(([id])=>{
      const s=students[id];
      return s&&s.active&&(trendClass==='ALL'||s.cls===trendClass);
    });
    return{date,out:entries.filter(([,st])=>st==='out').length,late:entries.filter(([,st])=>st==='late').length};
  });
  const maxDay=Math.max(1,...dailyCounts.map(d=>d.out+d.late));

  let html='';

  // class overview cards (only on ALL)
  if(trendClass==='ALL'){
    html+=`<div style="font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:10px">Class overview (all time)</div>`;
    html+=`<div class="class-grid">`;
    CLASSES.forEach(c=>{
      const cs=classStats[c];
      const total=(cs.out||0)+(cs.late||0);
      html+=`<div class="class-card" onclick="trendClass='${c}';renderTrends()">
        <div class="class-card-name">${c}</div>
        <div class="class-mini-stats">
          <span class="mini-badge" style="background:var(--red-bg);color:var(--red-text)">${cs.out||0} out</span>
          <span class="mini-badge" style="background:var(--amber-bg);color:var(--amber-text)">${cs.late||0} late</span>
        </div>
      </div>`;
    });
    html+=`</div>`;
  }

  // daily trend bars
  html+=`<div style="font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:10px;margin-top:1.25rem">Daily incidents — last 14 days${trendClass!=='ALL'?' · '+trendClass:''}</div>`;
  html+=`<div style="display:flex;align-items:flex-end;gap:5px;height:80px;margin-bottom:1.5rem">`;
  dailyCounts.forEach(d=>{
    const h=maxDay>0?Math.round(((d.out+d.late)/maxDay)*70):0;
    const hOut=maxDay>0?Math.round((d.out/maxDay)*70):0;
    const hLate=h-hOut;
    const label=d.date.slice(5);
    html+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px" title="${d.date}: ${d.out} not in, ${d.late} late">
      <div style="width:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:70px;gap:1px">
        ${hOut>0?`<div style="width:100%;height:${hOut}px;background:var(--red-border);border-radius:3px 3px 0 0"></div>`:''}
        ${hLate>0?`<div style="width:100%;height:${hLate}px;background:var(--amber-border);border-radius:${hOut>0?'0':'3px 3px 0 0'} 0 0"></div>`:''}
        ${h===0?`<div style="width:100%;height:3px;background:var(--surface3);border-radius:3px"></div>`:''}
      </div>
      <div style="font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;white-space:nowrap">${label}</div>
    </div>`;
  });
  html+=`</div>`;

  // repeat offenders
  if(studentTotals.length){
    html+=`<div style="font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:10px">Top repeat offenders${trendClass!=='ALL'?' · '+trendClass:''}</div>`;
    studentTotals.forEach(s=>{
      const pct=Math.round((s.total/maxTotal)*100);
      html+=`<div class="trend-row" style="cursor:pointer" onclick="openDrill('${s.id}')">
        <div class="trend-name">${s.name} <span style="font-size:11px;color:var(--text3)">${s.cls}</span></div>
        <div style="display:flex;gap:5px;margin-right:6px">
          <span class="badge badge-out">${s.out}</span>
          <span class="badge badge-late">${s.late}</span>
        </div>
        <div class="trend-bar-wrap"><div class="trend-bar" style="width:${pct}%"></div></div>
        <div class="trend-count">${s.total}</div>
      </div>`;
    });
  } else {
    html+=`<div style="font-size:13px;color:var(--text3);padding:1rem 0">No incidents recorded yet.</div>`;
  }

  document.getElementById('trendsContent').innerHTML=html;
}

// ─── TOAST ─────────────────────────────────────────────────
let toastTimer=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

// ─── CSV UPLOAD ────────────────────────────────────────────
function showUploadScreen(){
  document.getElementById('uploadScreen').style.display='flex';
}
function hideUploadScreen(){
  document.getElementById('uploadScreen').style.display='none';
}
function handleCSVUpload(input){
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    const text=e.target.result;
    const lines=text.trim().split(/
?
/);
    const students={};
    let skipped=0;
    lines.forEach((line,i)=>{
      if(i===0&&line.toLowerCase().startsWith('id')) return; // skip header
      const parts=line.split(',').map(s=>s.replace(/^"|"$/g,'').trim());
      if(parts.length<3) return;
      const [id,name,cls]=parts;
      if(!id||!name||!cls){skipped++;return}
      students[id]={id,name:name,cls:cls,active:true};
    });
    const count=Object.keys(students).length;
    if(count===0){document.getElementById('uploadError').textContent='No valid rows found. Check the format.';return}
    saveStudents(students);
    hideUploadScreen();
    showToast(`Loaded ${count} students`);
    renderDash();
  };
  reader.readAsText(file);
}

function clearStudentData(){
  if(!confirm('Remove all student data from this device? Incident logs will also be cleared.')) return;
  localStorage.removeItem('phc_students');
  localStorage.removeItem('phc_logs');
  showToast('Data cleared');
  showUploadScreen();
}

// ─── EXPORT ────────────────────────────────────────────────
function exportCSV(){
  const students=loadStudents();
  const dl=getDayLogs(currentDate);
  const marked=Object.entries(dl).map(([id,status])=>{
    const s=students[id];
    if(!s||!s.active) return null;
    const parts=s.name.trim().split(' ');
    const fname=parts[0];
    const lname=parts.slice(1).join(' ');
    const statusLabel=status==='out'?'Not handed in':'Late / Reception';
    return[currentDate,fname,lname,s.cls,statusLabel];
  }).filter(Boolean);
  if(!marked.length){showToast('No marked students to export');return}
  const header='Date,First name,Last name,Class,Status';
  const rows=marked.map(r=>r.map(v=>`"${v}"`).join(','));
  const csv=[header,...rows].join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=`phone-checkin-${currentDate}.csv`;
  a.click();
  showToast(`Exported ${marked.length} student${marked.length>1?'s':''}`);
}
